<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Crypto Intelligence Platform{% endblock %}</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="ambient" aria-hidden="true">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <header class="site-header">
        <div class="header-inner">
            <div class="brand">
                <div class="brand-icon" aria-hidden="true">◆</div>
                <div>
                    <h1 class="brand-title">Crypto Intelligence</h1>
                    <p class="brand-subtitle">Market dashboard</p>
                </div>
            </div>
            <div class="header-badge">Live</div>
        </div>
    </header>

    <main class="site-main">
        {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
        <p>Data from CoinGecko, Alternative.me &amp; NewsAPI</p>
    </footer>
</body>
</html>
